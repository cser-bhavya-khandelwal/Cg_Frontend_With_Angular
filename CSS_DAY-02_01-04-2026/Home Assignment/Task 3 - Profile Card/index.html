<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <style>
    body {
      background-color: #e9e5e1; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .profile-card {
      background-color: #fcf4eb; 
      width: 320px;
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      border: none; 
      text-align: center; 
    }

    .profile-image-container {
      width: 110px;
      height: 110px;
      margin: 0 auto 20px auto;
      background-color: blanchedalmond; 
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .profile-image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      margin: 0 0 12px;
      font-size: 24px;
      color: palevioletred; 
      font-weight: 600;
    }

    .profile-bio {
      margin: 0 0 35px;
      font-size: 14px;
      line-height: 1.6;
      color: teal;
    }

    .profile-stats {
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: darkcyan; 
    }
  </style>
</head>
<body>

  <div class="profile-card">
    
    <div class="profile-image-container">
      <img src="https://mir-s3-cdn-cf.behance.net/user/276/ba5d29587262623.628c3dccdbb87.jpg" alt="Profile">
    </div>

    <h2 class="profile-name">Bhavya Khandelwal</h2>
    
    <p class="profile-bio">
      Hi, I am Bhavya Khandelwal, a Computer Science student driven to create impactful projects and grow into a skilled software developer.
    </p>
    
    <div class="profile-stats">
      <div class="stat">
        <span class="stat-value">5+</span>
      </div>
      <div class="stat">
        <span class="stat-value">23</span>
      </div>
      <div class="stat">
        <span class="stat-value">1.7k</span>
      </div>
    </div>

  </div>

</body>
</html>
