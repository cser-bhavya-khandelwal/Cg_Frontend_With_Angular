<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cdnjs Navbar</title>
  <style>
    body {
      margin: 0;
      font-family: 'Times New Roman', Times, serif;
      background-color: #222;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #383838;
      padding: 0 30px;
      height: 65px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .logo {
      font-size: 26px;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .logo .bracket { 
      color: #999; 
      font-weight: 400;
    }

    .logo .cdn { 
      color: #e65100;
    } 

    .logo .js { 
      color: #ffffff; 
    }

    .social-icons {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .social-icons img {
      width: 22px;
      height: 22px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .social-icons img:hover {
      transform: scale(1.2);
    }

    .nav-right {
      display: flex;
      align-items: center;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 28px;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      text-decoration: none;
      color: #f3f4f6;
      font-size: 15px;
      transition: opacity 0.2s ease;
    }

    .nav-links li a:hover {
      opacity: 0.8;
    }

    .status-link {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: #2ecc71;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
        <span class="bracket">&lt;</span><span class="cdn">cdn</span><span class="js">js</span><span class="bracket">&gt;</span>
      </div>

      <div class="social-icons">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter">
      </div>

    </div>
    
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#">About</a></li>
        <li><a href="#">Libraries</a></li>
        <li><a href="#">API</a></li>
        <li><a href="#">GitHub</a></li>
        <li><a href="#" class="status-link">Status <span class="status-dot"></span></a></li>
      </ul>
    </div>
  </nav>

</body>
</html>
