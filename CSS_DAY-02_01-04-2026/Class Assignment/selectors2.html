<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>

    <style>
         div p {
            background-color:red;
        }

        div>p {
            background-color: aqua;
        }

        h1+p{
            background-color:yellow;
        }

        h1~p {
            background-color: magenta;
        }

    </style>
</head>

<body>

    <div>
        <p>Para 1</p>
        <p>Para 2</p>

        <section>
            <p>Para 3</p>
        </section>

        <h1>HELLO</h1>

        <p>Para 4</p>
        <p>Hii</p>
    </div>

</body>
</html>
