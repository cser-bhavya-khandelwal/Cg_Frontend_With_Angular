<!DOCTYPE html>
<html>
<head>
    <title>Different Text Properties</title>

    <style>
        .line1 {
            color: red;
            text-align: center;
        }

        .line2 {
            text-transform:lowercase;
            letter-spacing: 15px;
        }

        .line3 {
            text-decoration:line-through;
            word-spacing: 10px;
            line-height: 40px;
        }

        .line4 {
            font-size: 24px;
            font-style: italic;
        }

        .line5 {
            font-weight: bold;
            background-color: lightblue;
            
        }

       
    </style>

</head>
<body>


<p class="line1">Here we are using text and font properties</p>

<p class="line2">Hello World </p>

<p class="line3">Hello World <br> How are you </p>

<p class="line4">Hello World</p>

<p class="line5">Hello World</p>

</body>
</html>
