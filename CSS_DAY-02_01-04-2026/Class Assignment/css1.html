<!DOCTYPE html>
<html>
<head>
    <title>All CSS Types</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        .internal {
            background-color: lightblue;
        }
    </style>

</head>
<body>

<h2>Inline CSS</h2>
<p style="background-color: yellow;">Hello World (Inline CSS)</p>

<h2>Internal CSS</h2>
<p class="internal">Hello World (Internal CSS)</p>

<h2>External CSS</h2>
<p class="external">Hello World (External CSS)</p>

</body>
</html>
