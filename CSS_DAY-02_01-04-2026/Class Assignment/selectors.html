<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors</title>

    <style>
        h1 {
            background-color: pink;
        }
        .box {
            background-color: teal;
        }
        #id1 {
            background-color: lightgreen;
        }
        * {
            font-family: Arial;
        }

      
    </style>

</head>
<body>

<h1>using element Selector</h1>

<p class="box">using Class Selector</p>

<p id="id1"> using ID Selector</p>


</body>
</html>
