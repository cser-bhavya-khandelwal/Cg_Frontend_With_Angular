<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model</title>

    <style>
        .box {
            width: 200px;
            height: 100px;
            background-color: #774382;

            padding: 50px;      /* space inside */
            border: 5px solid yellow; /* border */
            margin: 20px 40px 30px 25px ;       /* space outside */
        }

        h1 {
            margin:10px,20px,30px;
            border: 10px;
            border-style: solid;
            border-color: red;
            padding: 50px 10px 25px 100px;

        }
    </style>



</head>
<body>

<div class="box">
    Hello World
</div>

<h1>Hello</h1>

</body>
</html>
