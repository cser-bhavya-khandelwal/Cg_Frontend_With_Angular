<!DOCTYPE html>
<html>
<head>
    <title>Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            padding: 10px 20px;
            color: white;
        }

       

        .left img {
            width: 40px;
            height: 40px;
        }

        .center {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .center a {
            color: white;
        }

        .center input {
            padding: 5px;
        }

        .center button {
            padding: 5px 10px;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

    .right img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

    </style>

</head>
<body>

<div class="navbar">

    <div class="left">
        <img src="/OIP.jpeg">
    </div>

    <div class="center">
      <p>Home </p>
      <p> About</p>
        <input type="text" placeholder="Search">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <div class="right">
         <img src="/OIP.jpeg" class="profile">
        <button>Logout</button>
    </div>

</div>

</body>
</html>
