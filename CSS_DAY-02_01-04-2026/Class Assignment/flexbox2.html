<!DOCTYPE html>
<html>
<head>
<style>

.container {
  width: 400px;
  height: 300px;
  border: 2px solid black;

  display: flex;
  /* flex-wrap: wrap; */
  flex-wrap: wrap-reverse;


  gap: 20px;
  padding: 20px;
}

.box {
  width: 60px;
  height: 60px;
  background-color: red;
  color: black;
  font-size: 20px;

  display: flex;
  justify-content: center;
  align-items: center;

  flex: 0 0 calc(25% - 20px);
}

</style>
</head>
<body>

<div class="container">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
  <div class="box">5</div>
  <div class="box">6</div>
  <div class="box">7</div>
  <div class="box">8</div>
</div>

</body>
</html>
