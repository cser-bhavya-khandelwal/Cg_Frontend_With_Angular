<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Structure of a Webpage</h1>
    <h2> Hello</h2>
    <h3> Hello</h3>
    <h4> Hello</h4>
    <h5> Hello</h5>
    <h6> Hello</h6>
    <b>Bold Hello</b>
    <p><strong>strong hello</strong></p>
    <p><i>italic hello</i></p>
    <p><em>emphasized hello</em></p>
    <p><u>underlined hello</u></p>
    <p><mark>highlighted hello</mark></p>
    <p>H<sub>2</sub>O</p>
</body>
</html>
