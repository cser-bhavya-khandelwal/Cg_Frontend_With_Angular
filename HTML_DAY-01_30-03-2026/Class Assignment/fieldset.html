<!DOCTYPE html>
<html>
<head>
    <title>Fieldset Example</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        fieldset {
            width: 300px;
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid #999;
        }

        legend {
            font-weight: bold;
            font-size: 18px;
            color: #444;
        }

        select {
            width: 100%;
            padding: 5px;
        }
    </style>
</head>
<body>

    <form>

        <fieldset>
            <legend>FIELDSET 1</legend>
            <select>
                <option>Option 1</option>
                <option>Option 2</option>
                <option>Option 3</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>FIELDSET 2</legend>
            <select>
                <option>Option A</option>
                <option>Option B</option>
                <option>Option C</option>
            </select>
        </fieldset>

    </form>

</body>
</html>
