<!DOCTYPE html>
<html>
<head>
    <title>Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            padding: 10px 20px;
            color: white;
        }

        .left img {
            width: 40px;
            height: 40px;
        }

        .center {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .center p {
            margin: 0;
        }

        .center input {
            padding: 5px;
        }

        .center button {
            padding: 5px 10px;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .right img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        @media (max-width: 700px) {
            .navbar {
                padding: 8px 10px;
            }

            .center {
                gap: 10px;
            }

            .center input {
                width: 80px;
            }

            .right img {
                width: 30px;
                height: 30px;
            }

            .left img {
                width: 30px;
                height: 30px;
            }
        }

        @media (max-width: 350px) {
            .center input,
            .center button {
                display: none;
            }
        }

    </style>

</head>
<body>

<div class="navbar">

    <div class="left">
        <img src="/OIP.jpeg">
    </div>

    <div class="center">
        <p>Home</p>
        <p>About</p>
        <input type="text" placeholder="Search">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <div class="right">
        <img src="/OIP.jpeg">
        <button>Logout</button>
    </div>

</div>

</body>
</html>
