<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Navbar</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js"></script>

</head>

<style>
     * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

.top-bar i {
  margin: 0 8px;
  cursor: pointer;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2fa36b;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 30px;
}

.nav-links li {
  cursor: pointer;
  transition: 0.3s;
}

.nav-links li:hover {
  color: #2fa36b;
}
.cta button {
  background: #2fa36b;
  border: none;
  padding: 10px 18px;
  color: white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.cta button:hover {
  background: #248a59;
}


.search i {
  cursor: pointer;
  font-size: 18px;
}
</style>
<body>



<!-- MAIN NAVBAR -->
<nav class="navbar">
  <div class="logo">Capgemini </div>

  <ul class="nav-links">
    <li>Home</li>
    <li>About</li>
    <li>Services</li>
    <li>Portfolio</li>
    <li>Contact</li>
  </ul>

  <div class="cta">
    <button>Know More→</button>
  </div>
</nav>
  <div class="search">
    <i class="fas fa-search"></i>
  </div>
</div>

</body>
</html>
